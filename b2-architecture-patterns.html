<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Workload 架构模式</title>
<link rel="stylesheet" href="common.css">
<style>
:root{--track-color:#ffa500}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f0c29,#2a1a0a,#29200f);min-height:100vh;color:#e0e0e0;overflow-x:hidden}
.container{max-width:1100px;margin:0 auto;padding:40px 20px}
h1{text-align:center;font-size:2.2rem;margin-bottom:8px;background:linear-gradient(90deg,#ff8c00,#ffa500,#ffbe4d);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{text-align:center;color:#888;margin-bottom:30px;font-size:.92rem}
.controls{display:flex;justify-content:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.btn{padding:10px 22px;border:none;border-radius:25px;cursor:pointer;font-size:.9rem;font-weight:600;transition:all .3s}
.btn-p{background:linear-gradient(135deg,#ff8c00,#ffa500);color:#000}
.btn-p:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(255,165,0,.4)}
.btn-s{background:rgba(255,255,255,.08);color:#ccc;border:1px solid rgba(255,255,255,.15)}
.btn-s:hover{background:rgba(255,255,255,.15)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.step-bar{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:25px}
.step-text{color:#aaa;font-size:.88rem}
.step-text span{color:#ffa500;font-weight:bold}
.progress-track{flex:1;max-width:300px;height:5px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.progress-track .bar{height:100%;background:linear-gradient(90deg,#ff8c00,#ffa500);border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1);width:0}
/* Stage card */
.stage-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:28px;position:relative;overflow:hidden;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.stage-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.stage-num{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#ff8c00,#ffa500);display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:.85rem;color:#000;flex-shrink:0}
.stage-title{font-size:1.2rem;font-weight:700;color:#fff}
.stage-desc{color:#aaa;line-height:1.7;font-size:.9rem;margin-bottom:16px}
.viz{background:rgba(0,0,0,.3);border-radius:12px;padding:20px;min-height:120px}
/* Architecture diagram styles */
.arch-row{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:12px;margin:10px 0}
.arch-box{padding:10px 16px;border-radius:8px;font-size:.8rem;font-weight:600;text-align:center;min-width:100px;animation:popUp .4s ease forwards;opacity:0;position:relative}
@keyframes popUp{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.arch-box.aws{background:rgba(255,153,0,.12);border:1px solid rgba(255,153,0,.5);color:#ffa500}
.arch-box.data{background:rgba(0,184,212,.12);border:1px solid rgba(0,184,212,.5);color:#00b8d4}
.arch-box.compute{background:rgba(0,229,160,.12);border:1px solid rgba(0,229,160,.5);color:#00e5a0}
.arch-box.ml{background:rgba(200,100,255,.12);border:1px solid rgba(200,100,255,.5);color:#c864ff}
.arch-box.user{background:rgba(255,200,0,.12);border:1px solid rgba(255,200,0,.5);color:#ffc800}
.arch-box.red{background:rgba(255,107,107,.12);border:1px solid rgba(255,107,107,.5);color:#ff6b6b}
.arch-arrow{color:rgba(255,165,0,.6);font-size:1.2rem;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.arch-arrow-down{display:block;text-align:center;color:rgba(255,165,0,.5);font-size:1.2rem;margin:6px 0;animation:pulse 1.5s infinite}
.arch-label{font-size:.7rem;color:#666;text-align:center;margin-top:4px}
/* Compare table */
.cmp-table{width:100%;border-collapse:collapse;font-size:.82rem}
.cmp-table th{padding:12px 8px;text-align:center;color:#ffa500;border-bottom:1px solid rgba(255,255,255,.15);font-size:.78rem;font-weight:600}
.cmp-table th:first-child{text-align:left}
.cmp-table td{padding:10px 8px;text-align:center;border-bottom:1px solid rgba(255,255,255,.06);color:#bbb}
.cmp-table td:first-child{text-align:left;color:#fff;font-weight:600}
.cmp-table tr:hover td{background:rgba(255,165,0,.04)}
.cmp-table .highlight-cell{color:#ffa500;font-weight:600}
/* Interactive filter */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04);color:#aaa;font-size:.78rem;cursor:pointer;transition:all .3s}
.filter-btn:hover,.filter-btn.active{border-color:rgba(255,165,0,.6);color:#ffa500;background:rgba(255,165,0,.08)}
/* Layer diagram */
.layer-stack{display:flex;flex-direction:column;gap:0;max-width:600px;margin:0 auto}
.layer{padding:14px 20px;text-align:center;font-size:.82rem;font-weight:600;border:1px solid;animation:slideRight .5s ease forwards;opacity:0;transform:translateX(-20px)}
@keyframes slideRight{to{opacity:1;transform:translateX(0)}}
.layer:first-child{border-radius:10px 10px 0 0}
.layer:last-child{border-radius:0 0 10px 10px}
/* Flow diagram */
.flow-row{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding:10px 0}
.flow-step{display:flex;flex-direction:column;align-items:center;min-width:90px;flex:1}
.flow-box{padding:8px 12px;border-radius:8px;font-size:.72rem;font-weight:600;text-align:center;width:100%}
.flow-connector{display:flex;align-items:center;justify-content:center;padding:0 4px;color:rgba(255,165,0,.5);font-size:.9rem}
</style>
</head>
<body>
<div class="container">
<h1>🏗️ AI Workload 架构模式</h1>
<p class="subtitle">AWS AI/ML 架构模式全解 — 从 RAG 到 Agent，从实时推理到多区域灾备</p>

<div class="controls">
<button class="btn btn-s" id="btnPrev" onclick="prev()">← 上一步</button>
<button class="btn btn-p" id="btnNext" onclick="next()">下一步 →</button>
<button class="btn btn-s" id="btnAuto" onclick="toggleAuto()">▶ 自动播放</button>
</div>

<div class="step-bar">
<span class="step-text">步骤 <span id="stepText">1 / 8</span></span>
<div class="progress-track"><div class="bar" id="progressBar"></div></div>
</div>

<div id="content"></div>
</div>

<script src="nav.js"></script>
<script src="progress.js"></script>
<script src="quiz.js"></script>
<script src="stepper.js"></script>
<script>
(function(){
'use strict';

// Helper to create delay-animated boxes
function box(label, cls, delay) {
  return '<div class="arch-box '+cls+'" style="animation-delay:'+(delay||0)+'s">'+label+'</div>';
}
function arrow(dir) {
  if(dir==='down') return '<div class="arch-arrow-down">↓</div>';
  return '<span class="arch-arrow">→</span>';
}

var stages = [
// ─── Step 1: 参考架构概览 ───
{
  title: '参考架构概览',
  desc: 'AWS AI/ML 参考架构分为四层：数据层、训练层、推理层、应用层。所有 AI Workload 都是这四层的不同组合。理解分层架构有助于快速定位每个模式的关键组件。',
  viz: function(){
    return '<div class="layer-stack">'+
      '<div class="layer" style="background:rgba(255,200,0,.08);border-color:rgba(255,200,0,.4);color:#ffc800;animation-delay:0s">🎯 应用层 — API Gateway / CloudFront / App</div>'+
      '<div class="layer" style="background:rgba(200,100,255,.08);border-color:rgba(200,100,255,.4);color:#c864ff;animation-delay:.1s">🤖 推理层 — Bedrock / SageMaker Endpoint / ECS</div>'+
      '<div class="layer" style="background:rgba(0,229,160,.08);border-color:rgba(0,229,160,.4);color:#00e5a0;animation-delay:.2s">🏋️ 训练层 — SageMaker Training / EC2 P5</div>'+
      '<div class="layer" style="background:rgba(0,184,212,.08);border-color:rgba(0,184,212,.4);color:#00b8d4;animation-delay:.3s">💾 数据层 — S3 / OpenSearch / Aurora pgvector / DynamoDB</div>'+
    '</div>'+
    '<div style="margin-top:16px;text-align:center;font-size:.78rem;color:#666">'+
      '<span style="color:#ffa500">🔑 关键原则：</span> 松耦合 · Serverless 优先 · 按需扩展 · 安全合规内建'+
    '</div>';
  }
},
// ─── Step 2: RAG 架构模式 ───
{
  title: 'RAG 架构模式',
  desc: '检索增强生成（RAG）是最常见的企业 AI 架构。通过 Knowledge Base 连接企业数据源，用向量检索 + LLM 生成，确保回答基于真实文档。关键组件：Bedrock Knowledge Base + OpenSearch Serverless / Aurora pgvector。',
  viz: function(){
    return '<div class="arch-row">'+
      box('📄 S3 文档','data',0)+arrow()+box('Bedrock KB','aws',0.1)+arrow()+box('Embedding','ml',0.2)+arrow()+box('OpenSearch<br>Serverless','data',0.3)+
    '</div>'+
    '<div class="arch-arrow-down">⬇ 检索</div>'+
    '<div class="arch-row">'+
      box('用户提问','user',0.4)+arrow()+box('Query<br>Embedding','ml',0.5)+arrow()+box('向量检索<br>Top-K','data',0.6)+arrow()+box('Bedrock<br>Claude/Titan','aws',0.7)+arrow()+box('生成回答','compute',0.8)+
    '</div>'+
    '<div style="margin-top:14px;padding:10px 14px;background:rgba(255,165,0,.05);border-left:3px solid rgba(255,165,0,.4);border-radius:0 8px 8px 0;font-size:.8rem;color:#aaa">'+
      '<strong style="color:#ffa500">SA 选型要点：</strong> OpenSearch Serverless 适合大规模检索（>100万文档）；Aurora pgvector 适合已有 PostgreSQL 的团队；Bedrock KB 一键集成最简单。'+
    '</div>';
  }
},
// ─── Step 3: Fine-tuning 架构 ───
{
  title: 'Fine-tuning 架构',
  desc: '当通用模型无法满足领域需求时，需要微调。架构核心：S3 存储训练数据 → SageMaker Training Job → Model Registry → 部署。支持 LoRA/QLoRA 降低成本。',
  viz: function(){
    return '<div class="arch-row">'+
      box('训练数据<br>S3','data',0)+arrow()+box('SageMaker<br>Training Job','compute',0.1)+arrow()+box('Model<br>Artifacts','data',0.2)+arrow()+box('Model<br>Registry','aws',0.3)+
    '</div>'+
    '<div class="arch-arrow-down">↓ CI/CD 部署</div>'+
    '<div class="arch-row">'+
      box('CodePipeline','aws',0.4)+arrow()+box('SageMaker<br>Endpoint','compute',0.5)+arrow()+box('A/B Testing','ml',0.6)+
    '</div>'+
    '<div style="margin-top:12px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center">'+
      '<div style="padding:8px 14px;background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.3);border-radius:8px;font-size:.75rem;color:#00e5a0">💡 LoRA: 仅训练 0.1% 参数</div>'+
      '<div style="padding:8px 14px;background:rgba(200,100,255,.08);border:1px solid rgba(200,100,255,.3);border-radius:8px;font-size:.75rem;color:#c864ff">🔧 Bedrock Custom Model: 全托管微调</div>'+
      '<div style="padding:8px 14px;background:rgba(0,184,212,.08);border:1px solid rgba(0,184,212,.3);border-radius:8px;font-size:.75rem;color:#00b8d4">📊 实例: ml.p4d.24xlarge (8×A100)</div>'+
    '</div>';
  }
},
// ─── Step 4: 实时推理架构 ───
{
  title: '实时推理架构',
  desc: '低延迟实时推理是生产环境最常见需求。三大选项：Bedrock API（最简单）、SageMaker Endpoint（最灵活）、ECS + TGI/vLLM（最可控）。选择取决于延迟要求、模型定制程度和成本预算。',
  viz: function(){
    var rows = [
      {name:'Bedrock API',latency:'~1-3s',cost:'按 Token',scale:'自动',custom:'低'},
      {name:'SageMaker Endpoint',latency:'~200ms-1s',cost:'按实例时',scale:'自动扩缩',custom:'高'},
      {name:'ECS + TGI/vLLM',latency:'~100-500ms',cost:'按实例时',scale:'自定义',custom:'最高'}
    ];
    var html = '<table class="cmp-table"><tr><th>方案</th><th>延迟</th><th>计费</th><th>扩展</th><th>定制度</th></tr>';
    rows.forEach(function(r){
      html+='<tr><td>'+r.name+'</td><td>'+r.latency+'</td><td>'+r.cost+'</td><td>'+r.scale+'</td><td>'+r.custom+'</td></tr>';
    });
    html+='</table>';
    html+='<div class="arch-arrow-down" style="margin:12px 0">▼ 典型架构</div>';
    html+='<div class="arch-row">'+
      box('客户端','user',0)+arrow()+box('API Gateway','aws',0.1)+arrow()+box('Lambda/<br>ALB','compute',0.2)+arrow()+box('SageMaker<br>Endpoint','ml',0.3)+
    '</div>';
    return html;
  }
},
// ─── Step 5: 批量推理架构 ───
{
  title: '批量推理架构',
  desc: '不需要实时响应时，批量推理能大幅降低成本（降 50%+）。适用场景：文档批量摘要、数据标注、离线分析。核心组件：Step Functions 编排 + Batch Transform / Bedrock Batch Inference。',
  viz: function(){
    return '<div class="arch-row">'+
      box('S3 输入<br>JSONL','data',0)+arrow()+box('Step<br>Functions','aws',0.1)+arrow()+box('Bedrock<br>Batch API','ml',0.2)+arrow()+box('S3 输出<br>结果','data',0.3)+
    '</div>'+
    '<div class="arch-arrow-down">↕ 或者</div>'+
    '<div class="arch-row">'+
      box('S3 输入','data',0.4)+arrow()+box('SageMaker<br>Batch Transform','compute',0.5)+arrow()+box('S3 输出','data',0.6)+
    '</div>'+
    '<div style="margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:.78rem">'+
      '<div style="padding:10px;background:rgba(255,165,0,.06);border:1px solid rgba(255,165,0,.25);border-radius:8px;color:#ccc"><strong style="color:#ffa500">Bedrock Batch</strong><br>• 全托管，无需管理实例<br>• 按 Token 计费打5折<br>• 支持所有 Bedrock 模型</div>'+
      '<div style="padding:10px;background:rgba(0,229,160,.06);border:1px solid rgba(0,229,160,.25);border-radius:8px;color:#ccc"><strong style="color:#00e5a0">SageMaker Batch</strong><br>• 自定义模型支持<br>• 灵活的实例选择<br>• 适合大规模 ML 管线</div>'+
    '</div>';
  }
},
// ─── Step 6: Agent 架构 ───
{
  title: 'Agent 架构',
  desc: 'Bedrock Agent 实现"思考-行动-观察"循环，自主完成复杂任务。通过 Action Group 调用外部 API（Lambda），通过 Knowledge Base 获取上下文。适合：客服自动化、数据分析、工作流编排。',
  viz: function(){
    return '<div style="text-align:center;margin-bottom:10px;font-size:.78rem;color:#888">ReAct Loop: Think → Act → Observe → Repeat</div>'+
    '<div class="arch-row">'+
      box('用户指令','user',0)+arrow()+box('Bedrock<br>Agent','aws',0.1)+
    '</div>'+
    '<div class="arch-arrow-down">↕ 循环调用</div>'+
    '<div class="arch-row" style="gap:20px">'+
      '<div style="display:flex;flex-direction:column;align-items:center;gap:6px">'+
        box('Action Group','compute',0.2)+
        '<div style="font-size:.68rem;color:#666">Lambda → 外部 API</div>'+
      '</div>'+
      '<div style="display:flex;flex-direction:column;align-items:center;gap:6px">'+
        box('Knowledge<br>Base','data',0.3)+
        '<div style="font-size:.68rem;color:#666">RAG 检索</div>'+
      '</div>'+
      '<div style="display:flex;flex-direction:column;align-items:center;gap:6px">'+
        box('Guardrails','red',0.4)+
        '<div style="font-size:.68rem;color:#666">安全过滤</div>'+
      '</div>'+
    '</div>'+
    '<div class="arch-arrow-down">↓ 返回结果</div>'+
    '<div class="arch-row">'+box('最终回答','compute',0.5)+'</div>'+
    '<div style="margin-top:12px;padding:10px 14px;background:rgba(255,165,0,.05);border-left:3px solid rgba(255,165,0,.4);border-radius:0 8px 8px 0;font-size:.78rem;color:#aaa">'+
      '<strong style="color:#ffa500">多 Agent 模式：</strong>Supervisor Agent 编排多个 Sub-Agent，每个 Sub-Agent 专注一个领域（如查订单 Agent + 退款 Agent + FAQ Agent）。'+
    '</div>';
  }
},
// ─── Step 7: 多区域/灾备 ───
{
  title: '多区域 / 灾备架构',
  desc: '对于关键 AI 应用，需要多 Region 部署确保高可用。策略包括：Active-Active（双活）、Active-Passive（主备）、Pilot Light（最小备份）。Bedrock 跨区域推理（Cross-Region Inference）是最简方案。',
  viz: function(){
    return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px">'+
      '<div style="padding:14px;background:rgba(0,229,160,.06);border:1px solid rgba(0,229,160,.3);border-radius:10px">'+
        '<div style="font-size:.85rem;font-weight:700;color:#00e5a0;margin-bottom:8px">🟢 Region A (主)</div>'+
        '<div style="font-size:.75rem;color:#aaa;line-height:1.6">• API Gateway + WAF<br>• Bedrock Endpoint<br>• OpenSearch 主集群<br>• S3 数据湖</div>'+
      '</div>'+
      '<div style="padding:14px;background:rgba(0,184,212,.06);border:1px solid rgba(0,184,212,.3);border-radius:10px">'+
        '<div style="font-size:.85rem;font-weight:700;color:#00b8d4;margin-bottom:8px">🔵 Region B (备)</div>'+
        '<div style="font-size:.75rem;color:#aaa;line-height:1.6">• API Gateway (备)<br>• Bedrock Endpoint<br>• OpenSearch 副本<br>• S3 CRR 复制</div>'+
      '</div>'+
    '</div>'+
    '<div class="arch-row">'+
      box('Route 53<br>健康检查','aws',0)+arrow()+box('CloudFront','aws',0.1)+arrow()+box('故障切换<br>Failover','red',0.2)+
    '</div>'+
    '<div style="margin-top:12px;font-size:.78rem;color:#888;text-align:center">'+
      '💡 Bedrock Cross-Region Inference: 自动跨区域路由，无需手动切换，RTO ≈ 0'+
    '</div>';
  }
},
// ─── Step 8: 架构决策矩阵 ───
{
  title: '架构决策矩阵',
  desc: '选择架构模式时，需要权衡延迟、成本、复杂度和灵活性。下表对比各模式的关键维度，帮助 SA 快速做出推荐决策。点击表头可排序。',
  viz: function(){
    var patterns = [
      {name:'RAG (Bedrock KB)',latency:'中 (1-3s)',cost:'💰',complexity:'低',flexibility:'中',bestFor:'企业知识问答'},
      {name:'Fine-tuning',latency:'低 (取决于部署)',cost:'💰💰💰',complexity:'高',flexibility:'高',bestFor:'领域专有任务'},
      {name:'实时推理 (Bedrock)',latency:'中 (1-3s)',cost:'💰',complexity:'最低',flexibility:'低',bestFor:'通用对话/生成'},
      {name:'实时推理 (SageMaker)',latency:'低 (200ms)',cost:'💰💰',complexity:'中',flexibility:'高',bestFor:'自定义模型部署'},
      {name:'实时推理 (ECS+TGI)',latency:'最低 (100ms)',cost:'💰💰',complexity:'高',flexibility:'最高',bestFor:'极致性能优化'},
      {name:'批量推理',latency:'无要求',cost:'💰(半价)',complexity:'低',flexibility:'中',bestFor:'离线处理/标注'},
      {name:'Agent',latency:'高 (5-30s)',cost:'💰💰',complexity:'中高',flexibility:'高',bestFor:'复杂任务编排'},
      {name:'多区域灾备',latency:'同单区域',cost:'💰💰💰',complexity:'高',flexibility:'中',bestFor:'关键业务高可用'}
    ];
    var html = '<div id="matrix-filter" class="filter-bar">'+
      '<span class="filter-btn active" data-filter="all">全部</span>'+
      '<span class="filter-btn" data-filter="low-cost">低成本</span>'+
      '<span class="filter-btn" data-filter="low-latency">低延迟</span>'+
      '<span class="filter-btn" data-filter="simple">简单</span>'+
    '</div>';
    html += '<div style="overflow-x:auto"><table class="cmp-table" id="decision-table"><tr>'+
      '<th>架构模式</th><th>延迟</th><th>成本</th><th>复杂度</th><th>灵活性</th><th>最佳场景</th></tr>';
    patterns.forEach(function(p){
      var costClass = p.cost === '💰' ? 'highlight-cell' : '';
      html+='<tr data-cost="'+p.cost.length+'" data-latency="'+(p.latency.indexOf('最低')>-1||p.latency.indexOf('低')>-1?'low':'high')+'" data-complexity="'+(p.complexity.indexOf('低')>-1||p.complexity==='最低'?'simple':'complex')+'">'+
        '<td>'+p.name+'</td><td>'+p.latency+'</td><td class="'+costClass+'">'+p.cost+'</td><td>'+p.complexity+'</td><td>'+p.flexibility+'</td><td style="font-size:.75rem;color:#aaa">'+p.bestFor+'</td></tr>';
    });
    html += '</table></div>';
    html += '<div style="margin-top:14px;padding:10px 14px;background:rgba(255,165,0,.05);border-left:3px solid rgba(255,165,0,.4);border-radius:0 8px 8px 0;font-size:.78rem;color:#aaa">'+
      '<strong style="color:#ffa500">决策流程：</strong>① 确定延迟要求 → ② 评估预算 → ③ 考虑团队能力 → ④ 选择最简满足需求的方案（KISS）'+
    '</div>';
    return html;
  }
}
];

// Add interactive filter for Step 8 decision matrix
document.getElementById('content').addEventListener('click', function(e){
  if(e.target.classList.contains('filter-btn')){
    var filter = e.target.getAttribute('data-filter');
    // Update active button
    var btns = document.querySelectorAll('#matrix-filter .filter-btn');
    btns.forEach(function(b){ b.classList.remove('active'); });
    e.target.classList.add('active');
    // Filter table rows
    var rows = document.querySelectorAll('#decision-table tr:not(:first-child)');
    rows.forEach(function(row){
      if(filter === 'all'){ row.style.display=''; return; }
      if(filter === 'low-cost' && row.getAttribute('data-cost')<='2'){ row.style.display=''; }
      else if(filter === 'low-latency' && row.getAttribute('data-latency')==='low'){ row.style.display=''; }
      else if(filter === 'simple' && row.getAttribute('data-complexity')==='simple'){ row.style.display=''; }
      else if(filter === 'all'){ row.style.display=''; }
      else { row.style.display='none'; }
    });
  }
});

})();
