<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Agent 架构模式</title>
<link rel="stylesheet" href="common.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f0c29,#1a0a2a,#200f29);min-height:100vh;color:#e0e0e0;overflow-x:hidden}
:root{--track-color:#c864ff}
.container{max-width:1100px;margin:0 auto;padding:40px 20px}
h1{text-align:center;font-size:2.2rem;margin-bottom:8px;background:linear-gradient(90deg,#c864ff,#8b5cf6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{text-align:center;color:#888;margin-bottom:35px;font-size:.95rem}
.controls{display:flex;justify-content:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.btn{padding:10px 22px;border:none;border-radius:25px;cursor:pointer;font-size:.9rem;font-weight:600;transition:all .3s}
.btn-p{background:linear-gradient(135deg,#c864ff,#8b5cf6);color:#fff}
.btn-p:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(200,100,255,.4)}
.btn-s{background:rgba(255,255,255,.08);color:#ccc;border:1px solid rgba(255,255,255,.15)}
.btn-s:hover{background:rgba(255,255,255,.15)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.step-bar{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:30px}
.step-text{color:#aaa;font-size:.9rem}
.step-text span{color:#c864ff;font-weight:bold}
.progress-track{width:200px;height:5px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.progress-track .bar{height:100%;background:linear-gradient(90deg,#c864ff,#8b5cf6);border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
/* Stage card */
.stage{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:28px;margin-bottom:16px;animation:fadeIn .4s ease}
.stage-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.stage-num{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#c864ff,#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:.8rem;color:#fff;flex-shrink:0}
.stage-title{font-size:1.2rem;font-weight:700;color:#fff}
.stage-desc{color:#aaa;line-height:1.8;font-size:.9rem;margin-bottom:14px}
.viz{background:rgba(0,0,0,.3);border-radius:12px;padding:20px;min-height:80px;position:relative;overflow:hidden}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes flowRight{0%{transform:translateX(-8px);opacity:0}50%{opacity:1}100%{transform:translateX(8px);opacity:0}}
@keyframes flowDown{0%{transform:translateY(-6px);opacity:0}50%{opacity:1}100%{transform:translateY(6px);opacity:0}}
@keyframes orbit{0%{transform:rotate(0deg) translateX(30px) rotate(0deg)}100%{transform:rotate(360deg) translateX(30px) rotate(-360deg)}}
@keyframes msgFlow{0%{opacity:0;transform:translate(0,0)}30%{opacity:1}70%{opacity:1}100%{opacity:0;transform:var(--flow-end)}}
/* Agent nodes */
.agent-node{display:inline-flex;flex-direction:column;align-items:center;gap:4px}
.agent-circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:600;border:2px solid;transition:all .3s}
.agent-label{font-size:.68rem;color:#aaa;text-align:center;max-width:64px}
/* Topology diagrams */
.topo-container{display:flex;flex-wrap:wrap;gap:20px;justify-content:center}
.topo-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:16px;min-width:200px;flex:1;max-width:240px;text-align:center}
.topo-card h4{font-size:.82rem;color:#c864ff;margin-bottom:10px;font-weight:600}
.topo-viz{min-height:80px;display:flex;align-items:center;justify-content:center}
/* Case cards */
.case-card{background:rgba(200,100,255,.04);border:1px solid rgba(200,100,255,.2);border-radius:10px;padding:16px;flex:1;min-width:220px}
.case-card h4{color:#c864ff;font-size:.88rem;margin-bottom:8px}
.case-card .case-desc{font-size:.76rem;color:#aaa;line-height:1.6}
.case-agents{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.case-agents span{font-size:.68rem;padding:3px 8px;border-radius:4px;background:rgba(200,100,255,.1);border:1px solid rgba(200,100,255,.25);color:#c864ff}
/* Msg animation */
.msg-particle{position:absolute;width:8px;height:8px;border-radius:50%;background:#c864ff;box-shadow:0 0 6px rgba(200,100,255,.6)}
.note{background:rgba(200,100,255,.05);border-left:3px solid rgba(200,100,255,.4);padding:10px 14px;border-radius:0 8px 8px 0;margin-top:12px;font-size:.82rem;color:#bbb;line-height:1.6}
.feynman{margin-top:14px}
</style>
</head>
<body>
<div class="container">
<h1>🤝 Multi-Agent 架构模式</h1>
<p class="subtitle">从单 Agent 到多 Agent 协作 — 复杂任务的分治之道</p>

<div class="controls">
<button class="btn btn-s" id="btnPrev" onclick="prev()">← 上一步</button>
<button class="btn btn-p" id="btnNext" onclick="next()">下一步 →</button>
<button class="btn btn-s" id="btnAuto" onclick="toggleAuto()">▶ 自动播放</button>
</div>

<div class="step-bar">
<div class="step-text">步骤 <span id="stepText">1 / 8</span></div>
<div class="progress-track"><div class="bar" id="progressBar" style="width:12.5%"></div></div>
</div>

<div id="content"></div>
</div>

<script src="nav.js"></script>
<script src="progress.js"></script>
<script src="quiz.js"></script>
<script src="stepper.js"></script>
<script>
// ─── Quiz Data ─────────────────────────────────────────────────────
const quizData = [
  {
    type: 'choice',
    question: '当任务需要"先规划、再分配、最后汇总"时，最适合的 Multi-Agent 模式是？',
    options: ['Debate 辩论模式', 'Supervisor/Worker 主管模式', '黑板模式', '网状 P2P 模式'],
    answer: 1,
    explanation: 'Supervisor/Worker 模式由主管 Agent 负责任务分解、分配给 Worker Agent 执行、最后汇总结果，适合有明确层级分工的场景。'
  },
  {
    type: 'choice',
    question: '以下哪种编排拓扑最适合"多个子任务互不依赖、可同时执行"的场景？',
    options: ['串行链', '并行扇出 (Fan-out)', '层级树', '单 Agent 循环'],
    answer: 1,
    explanation: '并行扇出将独立子任务分发给多个 Agent 同时执行，最后由 Aggregator 汇聚结果。适合子任务互不依赖的场景，能显著提升效率。'
  },
  {
    type: 'choice',
    question: '关于 Multi-Agent 设计原则，以下哪个说法是错误的？',
    options: ['Agent 数量越多越好，分工越细越灵活', '每个 Agent 应遵循单一职责原则', '应设计明确的 Agent 边界和通信协议', '优先用最少 Agent 解决问题（最小 Agent 原则）'],
    answer: 0,
    explanation: '过多的 Agent 会增加通信开销、状态管理复杂度和调试难度。应遵循"最小 Agent 原则"——只在确实需要时才增加新的 Agent。'
  }
];

// ─── Stage Definitions ─────────────────────────────────────────────
const stages = [
  // Step 1: 为什么要多 Agent
  {
    title: '为什么要多 Agent？',
    desc: '单个 Agent 面临<strong>上下文窗口有限</strong>、<strong>角色冲突</strong>（既要创作又要审查）、<strong>工具过载</strong>等瓶颈。当任务复杂到需要多种专业能力协作时，Multi-Agent 架构应运而生——就像一个团队比一个人更能应对大项目。',
    viz: function() {
      return `
        <div style="display:flex;gap:24px;flex-wrap:wrap;justify-content:center;align-items:flex-start">
          <div style="flex:1;min-width:200px;max-width:280px">
            <div style="text-align:center;margin-bottom:10px;color:#ff6b6b;font-weight:600;font-size:.82rem">❌ 单 Agent 局限</div>
            <div style="display:flex;flex-direction:column;gap:6px">
              <div style="padding:8px 12px;background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.25);border-radius:6px;font-size:.75rem;color:#ff8a8a">
                🧠 上下文窗口有限 → 遗忘早期信息
              </div>
              <div style="padding:8px 12px;background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.25);border-radius:6px;font-size:.75rem;color:#ff8a8a">
                🎭 角色冲突 → 既写代码又审代码？
              </div>
              <div style="padding:8px 12px;background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.25);border-radius:6px;font-size:.75rem;color:#ff8a8a">
                🔧 工具过载 → 50+ tools 难以选择
              </div>
              <div style="padding:8px 12px;background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.25);border-radius:6px;font-size:.75rem;color:#ff8a8a">
                ⏱️ 串行瓶颈 → 无法并行加速
              </div>
            </div>
          </div>
          <div style="display:flex;align-items:center;color:#555;font-size:1.5rem;padding-top:40px">→</div>
          <div style="flex:1;min-width:200px;max-width:280px">
            <div style="text-align:center;margin-bottom:10px;color:#c864ff;font-weight:600;font-size:.82rem">✅ Multi-Agent 优势</div>
            <div style="display:flex;flex-direction:column;gap:6px">
              <div style="padding:8px 12px;background:rgba(200,100,255,.08);border:1px solid rgba(200,100,255,.25);border-radius:6px;font-size:.75rem;color:#d98aff">
                🎯 专业分工 → 各 Agent 专注一件事
              </div>
              <div style="padding:8px 12px;background:rgba(200,100,255,.08);border:1px solid rgba(200,100,255,.25);border-radius:6px;font-size:.75rem;color:#d98aff">
                ⚡ 并行执行 → 子任务同时进行
              </div>
              <div style="padding:8px 12px;background:rgba(200,100,255,.08);border:1px solid rgba(200,100,255,.25);border-radius:6px;font-size:.75rem;color:#d98aff">
                🔄 互相检查 → Writer + Reviewer
              </div>
              <div style="padding:8px 12px;background:rgba(200,100,255,.08);border:1px solid rgba(200,100,255,.25);border-radius:6px;font-size:.75rem;color:#d98aff">
                📈 灵活扩展 → 按需增减 Agent
              </div>
            </div>
          </div>
        </div>
        <div class="note">💡 核心思想：<strong>分治法</strong>——将大任务拆解为多个子任务，由专门的 Agent 分别处理后汇聚结果。</div>
      `;
    }
  },
  // Step 2: 角色分工模式
  {
    title: '角色分工模式',
    desc: '三种经典的 Multi-Agent 角色分工模式：<strong>Supervisor/Worker</strong>（主管分配任务）、<strong>专家团队</strong>（平等协作）、<strong>Debate</strong>（辩论达成共识）。观察下方动画中的消息流转方向：',
    viz: function() {
      return `
        <div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center">
          <!-- Supervisor/Worker -->
          <div style="flex:1;min-width:200px;max-width:260px;background:rgba(200,100,255,.05);border:1px solid rgba(200,100,255,.2);border-radius:10px;padding:14px;position:relative">
            <div style="text-align:center;color:#c864ff;font-weight:600;font-size:.8rem;margin-bottom:12px">Supervisor / Worker</div>
            <div style="position:relative;height:120px">
              <div style="position:absolute;top:0;left:50%;transform:translateX(-50%)">
                <div style="width:38px;height:38px;border-radius:50%;background:rgba(200,100,255,.2);border:2px solid #c864ff;display:flex;align-items:center;justify-content:center;font-size:.9rem">👔</div>
              </div>
              <div style="position:absolute;bottom:0;left:15%">
                <div style="width:32px;height:32px;border-radius:50%;background:rgba(139,92,246,.15);border:2px solid #8b5cf6;display:flex;align-items:center;justify-content:center;font-size:.8rem">⚙️</div>
              </div>
              <div style="position:absolute;bottom:0;left:50%;transform:translateX(-50%)">
                <div style="width:32px;height:32px;border-radius:50%;background:rgba(139,92,246,.15);border:2px solid #8b5cf6;display:flex;align-items:center;justify-content:center;font-size:.8rem">⚙️</div>
              </div>
              <div style="position:absolute;bottom:0;right:15%">
                <div style="width:32px;height:32px;border-radius:50%;background:rgba(139,92,246,.15);border:2px solid #8b5cf6;display:flex;align-items:center;justify-content:center;font-size:.8rem">⚙️</div>
              </div>
              <!-- Animated arrows -->
              <svg style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none">
                <line x1="50%" y1="42" x2="25%" y2="85" stroke="rgba(200,100,255,.3)" stroke-width="1" stroke-dasharray="4 2"/>
                <line x1="50%" y1="42" x2="50%" y2="85" stroke="rgba(200,100,255,.3)" stroke-width="1" stroke-dasharray="4 2"/>
                <line x1="50%" y1="42" x2="75%" y2="85" stroke="rgba(200,100,255,.3)" stroke-width="1" stroke-dasharray="4 2"/>
                <circle r="3" fill="#c864ff">
                  <animateMotion dur="2s" repeatCount="indefinite" path="M100,42 L50,85" />
                </circle>
                <circle r="3" fill="#c864ff">
                  <animateMotion dur="2s" repeatCount="indefinite" path="M100,42 L100,85" begin="0.6s" />
                </circle>
                <circle r="3" fill="#c864ff">
                  <animateMotion dur="2s" repeatCount="indefinite" path="M100,42 L150,85" begin="1.2s" />
                </circle>
              </svg>
            </div>
            <div style="font-size:.68rem;color:#888;text-align:center;margin-top:8px">主管分解 → 分配 → 汇总</div>
          </div>
          <!-- Expert Team -->
          <div style="flex:1;min-width:200px;max-width:260px;background:rgba(0,184,212,.05);border:1px solid rgba(0,184,212,.2);border-radius:10px;padding:14px">
            <div style="text-align:center;color:#00b8d4;font-weight:600;font-size:.8rem;margin-bottom:12px">专家团队（协作）</div>
            <div style="position:relative;height:120px">
              <div style="position:absolute;top:15px;left:50%;transform:translateX(-50%)">
                <div style="width:34px;height:34px;border-radius:50%;background:rgba(0,184,212,.15);border:2px solid #00b8d4;display:flex;align-items:center;justify-content:center;font-size:.8rem">🔬</div>
              </div>
              <div style="position:absolute;bottom:10px;left:18%">
                <div style="width:34px;height:34px;border-radius:50%;background:rgba(0,229,160,.15);border:2px solid #00e5a0;display:flex;align-items:center;justify-content:center;font-size:.8rem">✍️</div>
              </div>
              <div style="position:absolute;bottom:10px;right:18%">
                <div style="width:34px;height:34px;border-radius:50%;background:rgba(255,165,0,.15);border:2px solid #ffa500;display:flex;align-items:center;justify-content:center;font-size:.8rem">🎨</div>
              </div>
              <svg style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none">
                <line x1="50%" y1="52" x2="30%" y2="85" stroke="rgba(0,184,212,.25)" stroke-width="1" stroke-dasharray="3 2"/>
                <line x1="50%" y1="52" x2="70%" y2="85" stroke="rgba(0,184,212,.25)" stroke-width="1" stroke-dasharray="3 2"/>
                <line x1="30%" y1="95" x2="70%" y2="95" stroke="rgba(0,184,212,.25)" stroke-width="1" stroke-dasharray="3 2"/>
                <circle r="2.5" fill="#00b8d4">
                  <animateMotion dur="2.5s" repeatCount="indefinite" path="M100,52 L60,85 L140,95 L100,52" />
                </circle>
              </svg>
            </div>
            <div style="font-size:.68rem;color:#888;text-align:center;margin-top:8px">平等协作 → 互相补充</div>
          </div>
          <!-- Debate -->
          <div style="flex:1;min-width:200px;max-width:260px;background:rgba(255,165,0,.05);border:1px solid rgba(255,165,0,.2);border-radius:10px;padding:14px">
            <div style="text-align:center;color:#ffa500;font-weight:600;font-size:.8rem;margin-bottom:12px">Debate 辩论</div>
            <div style="position:relative;height:120px">
              <div style="position:absolute;top:30px;left:20%">
                <div style="width:36px;height:36px;border-radius:50%;background:rgba(255,107,107,.15);border:2px solid #ff6b6b;display:flex;align-items:center;justify-content:center;font-size:.85rem">🗣</div>
                <div style="font-size:.6rem;color:#888;text-align:center;margin-top:2px">正方</div>
              </div>
              <div style="position:absolute;top:30px;right:20%">
                <div style="width:36px;height:36px;border-radius:50%;background:rgba(0,229,160,.15);border:2px solid #00e5a0;display:flex;align-items:center;justify-content:center;font-size:.85rem">🗣</div>
                <div style="font-size:.6rem;color:#888;text-align:center;margin-top:2px">反方</div>
              </div>
              <div style="position:absolute;bottom:5px;left:50%;transform:translateX(-50%)">
                <div style="width:34px;height:34px;border-radius:50%;background:rgba(255,200,0,.15);border:2px solid #ffc800;display:flex;align-items:center;justify-content:center;font-size:.8rem">⚖️</div>
                <div style="font-size:.6rem;color:#888;text-align:center;margin-top:2px">裁判</div>
              </div>
              <svg style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none">
                <line x1="38%" y1="48" x2="62%" y2="48" stroke="rgba(255,165,0,.3)" stroke-width="1.5" stroke-dasharray="4 2"/>
                <circle r="3" fill="#ffa500">
                  <animateMotion dur="1.5s" repeatCount="indefinite" path="M76,48 L124,48" />
                </circle>
                <circle r="3" fill="#ff6b6b">
                  <animateMotion dur="1.5s" repeatCount="indefinite" path="M124,48 L76,48" begin="0.7s" />
                </circle>
              </svg>
            </div>
            <div style="font-size:.68rem;color:#888;text-align:center;margin-top:8px">对立论证 → 裁判决策</div>
          </div>
        </div>
        <div class="note">💡 选择依据：任务层级明确 → Supervisor；需要创意碰撞 → Debate；需要多专业综合 → 专家团队。</div>
      `;
    }
  },
  // Step 3: 通信模式
  {
    title: '通信模式',
    desc: 'Agent 之间如何交换信息？三种核心通信模式各有优劣：<strong>共享状态</strong>（所有 Agent 读写同一状态池）、<strong>消息传递</strong>（点对点/广播）、<strong>黑板模式</strong>（写入公共空间、订阅感兴趣的变化）。',
    viz: function() {
      return `
        <div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center">
          <!-- Shared State -->
          <div style="flex:1;min-width:180px;max-width:240px;text-align:center">
            <div style="color:#c864ff;font-weight:600;font-size:.78rem;margin-bottom:10px">共享状态</div>
            <div style="position:relative;height:100px;background:rgba(200,100,255,.05);border:1px dashed rgba(200,100,255,.3);border-radius:8px;display:flex;align-items:center;justify-content:center">
              <div style="padding:6px 14px;background:rgba(200,100,255,.15);border:1px solid rgba(200,100,255,.4);border-radius:6px;font-size:.72rem;color:#c864ff;font-weight:600">State Pool</div>
              <div style="position:absolute;top:-8px;left:15%;width:24px;height:24px;border-radius:50%;background:rgba(200,100,255,.2);border:1px solid #c864ff;display:flex;align-items:center;justify-content:center;font-size:.6rem">A</div>
              <div style="position:absolute;top:-8px;right:15%;width:24px;height:24px;border-radius:50%;background:rgba(200,100,255,.2);border:1px solid #c864ff;display:flex;align-items:center;justify-content:center;font-size:.6rem">B</div>
              <div style="position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:24px;height:24px;border-radius:50%;background:rgba(200,100,255,.2);border:1px solid #c864ff;display:flex;align-items:center;justify-content:center;font-size:.6rem">C</div>
            </div>
            <div style="font-size:.68rem;color:#888;margin-top:8px">所有 Agent 读写同一状态<br>⚡ 简单 | ⚠️ 冲突风险</div>
          </div>
          <!-- Message Passing -->
          <div style="flex:1;min-width:180px;max-width:240px;text-align:center">
            <div style="color:#00b8d4;font-weight:600;font-size:.78rem;margin-bottom:10px">消息传递</div>
