<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔐 安全合规 — AI 系统的安全防线</title>
<link rel="stylesheet" href="common.css">
<style>
:root { --track-color: #ffa500; }
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#0a0a1a,#1a1a2e,#1f1a0a);min-height:100vh;color:#e0e0e0;overflow-x:hidden}
.container{max-width:1100px;margin:0 auto;padding:40px 20px}
h1{text-align:center;font-size:2.2rem;margin-bottom:8px;background:linear-gradient(90deg,#ffa500,#ffcc00);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{text-align:center;color:#888;margin-bottom:35px;font-size:.95rem}
.controls{display:flex;justify-content:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.btn{padding:10px 22px;border:none;border-radius:25px;cursor:pointer;font-size:.9rem;font-weight:600;transition:all .3s}
.btn-p{background:linear-gradient(135deg,#ffa500,#ffcc00);color:#000}
.btn-p:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(255,165,0,.4)}
.btn-s{background:rgba(255,255,255,.08);color:#ccc;border:1px solid rgba(255,255,255,.15)}
.btn-s:hover{background:rgba(255,255,255,.15)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.progress-wrap{margin-bottom:25px}
.progress-outer{width:100%;height:6px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.progress-inner{height:100%;background:linear-gradient(90deg,#ffa500,#ffcc00);border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1);width:0}
.step-text{text-align:center;margin-top:8px;color:#aaa;font-size:.85rem}
.step-text span{color:#ffa500;font-weight:bold}
/* Content area */
#content{min-height:400px}
.stage{background:rgba(255,255,255,.03);border:1px solid rgba(255,165,0,.2);border-radius:14px;padding:28px;animation:fadeIn .4s ease}
.stage-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.stage-num{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#ffa500,#ffcc00);display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:.85rem;color:#000;flex-shrink:0}
.stage-title{font-size:1.25rem;font-weight:700;color:#fff}
.stage-desc{color:#aaa;line-height:1.8;font-size:.9rem;margin-bottom:16px}
.viz{background:rgba(0,0,0,.3);border-radius:12px;padding:20px;min-height:80px;overflow:hidden}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-15px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes flowLine{0%{stroke-dashoffset:20}100%{stroke-dashoffset:0}}
@keyframes ripple{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.4);opacity:0}}

/* Onion layers */
.onion-wrap{display:flex;align-items:center;justify-content:center;min-height:260px;position:relative}
.onion-layer{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .6s cubic-bezier(.4,0,.2,1);opacity:0;transform:scale(.6)}
.onion-layer.show{opacity:1;transform:scale(1)}
.onion-layer .label{position:absolute;font-size:.72rem;font-weight:600;white-space:nowrap}

/* VPC topology */
.vpc-topo{position:relative;min-height:320px}
.vpc-box{border:2px dashed rgba(255,165,0,.4);border-radius:16px;padding:20px;position:relative}
.subnet{border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:14px;margin:8px;display:inline-block;min-width:140px;vertical-align:top}
.subnet-pub{border-color:rgba(0,200,100,.4);background:rgba(0,200,100,.03)}
.subnet-priv{border-color:rgba(100,150,255,.4);background:rgba(100,150,255,.03)}
.svc-node{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:.75rem;margin:4px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12)}
.conn-line{position:absolute;pointer-events:none}

/* Token styles */
.tok{display:inline-flex;padding:5px 12px;border-radius:6px;font-family:'Courier New',monospace;font-size:.8rem;margin:3px;animation:fadeUp .4s ease forwards;opacity:0}
.tok-orange{background:rgba(255,165,0,.12);border:1px solid rgba(255,165,0,.4);color:#ffa500}
.tok-green{background:rgba(0,220,130,.12);border:1px solid rgba(0,220,130,.4);color:#00dc82}
.tok-blue{background:rgba(80,160,255,.12);border:1px solid rgba(80,160,255,.4);color:#50a0ff}
.tok-red{background:rgba(255,80,80,.12);border:1px solid rgba(255,80,80,.4);color:#ff5050}
.tok-purple{background:rgba(180,100,255,.12);border:1px solid rgba(180,100,255,.4);color:#b464ff}
.tok-yellow{background:rgba(255,200,0,.12);border:1px solid rgba(255,200,0,.4);color:#ffc800}

/* Cards */
.card-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
.card-sm{flex:1;min-width:160px;padding:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:10px;font-size:.8rem;color:#bbb;line-height:1.6}
.card-sm h4{color:#fff;font-size:.88rem;margin-bottom:6px}
.card-sm .icon{font-size:1.3rem;margin-bottom:8px}

/* Note */
.note{background:rgba(255,165,0,.05);border-left:3px solid rgba(255,165,0,.5);padding:12px 16px;border-radius:0 8px 8px 0;font-size:.84rem;color:#ccc;line-height:1.7;margin-bottom:20px}

/* Real case */
.real-case{background:rgba(255,165,0,.05);border-left:3px solid rgba(255,165,0,.4);padding:10px 14px;border-radius:0 8px 8px 0;margin-bottom:20px;font-size:.85rem;color:#ffa500;line-height:1.6}

/* Compliance matrix */
.matrix-table{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:12px}
.matrix-table th{padding:10px 8px;text-align:center;color:#ffa500;border-bottom:1px solid rgba(255,255,255,.15);font-size:.75rem}
.matrix-table th:first-child{text-align:left}
.matrix-table td{padding:8px;text-align:center;border-bottom:1px solid rgba(255,255,255,.06);color:#bbb}
.matrix-table td:first-child{text-align:left;color:#fff;font-weight:600}
.matrix-table tr:hover td{background:rgba(255,165,0,.03)}
.check{color:#00dc82}
.partial{color:#ffc800}

/* Nav */
.nav-bottom{margin-top:50px;padding-top:25px;border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:center;gap:16px;flex-wrap:wrap}
.nav-link{color:#ffa500;text-decoration:none;font-size:.88rem;padding:10px 20px;border:1px solid rgba(255,165,0,.3);border-radius:25px;transition:all .3s}
.nav-link:hover{background:rgba(255,165,0,.1);border-color:rgba(255,165,0,.6)}

@media(max-width:600px){
  .card-row{flex-direction:column}
  .onion-wrap{min-height:200px}
  .vpc-topo{min-height:240px}
}
</style>
</head>

<script>
// === Quiz Data ===
var quizData = [
  {
    type: 'choice',
    question: '在 AWS 中，SageMaker 训练任务需要访问 S3 数据。根据最小权限原则，以下哪种 IAM 策略配置最合适？',
    options: [
      'A. 给 SageMaker Execution Role 授予 s3:* 权限',
      'B. 给 SageMaker Execution Role 授予对特定 S3 桶和前缀的 s3:GetObject 权限',
      'C. 使用 AWS 管理策略 AmazonS3FullAccess',
      'D. 直接使用 Root 账户的 Access Key'
    ],
    answer: 1,
    explanation: '最小权限原则要求只授予完成任务所需的最小权限。训练任务只需读取特定桶中的数据，应限制到具体的桶和前缀，且只需 s3:GetObject 权限。使用 s3:* 或 FullAccess 都违反最小权限原则，使用 Root 账户更是严重安全隐患。'
  },
  {
    type: 'choice',
    question: '为什么在 VPC 中部署 SageMaker 端点时推荐使用 PrivateLink 而非 NAT Gateway 访问 Bedrock API？',
    options: [
      'A. PrivateLink 更便宜',
      'B. PrivateLink 使流量不经过公共互联网，减少数据泄露风险',
      'C. NAT Gateway 不支持 HTTPS',
      'D. PrivateLink 速度更快'
    ],
    answer: 1,
    explanation: 'PrivateLink（VPC Endpoint）创建私有连接，流量完全在 AWS 骨干网内传输，不经过公共互联网。这消除了数据在传输过程中被窃听或中间人攻击的风险。NAT Gateway 虽然也支持 HTTPS，但流量需经过互联网网关，增加了攻击面。'
  },
  {
    type: 'choice',
    question: '以下哪项不是 Amazon Bedrock Guardrails 提供的功能？',
    options: [
      'A. 内容过滤（有害内容拦截）',
      'B. PII 检测与脱敏',
      'C. 模型权重加密',
      'D. Denied Topics（话题拒绝）'
    ],
    answer: 2,
    explanation: 'Bedrock Guardrails 提供的核心功能包括：内容过滤（按严重程度分级拦截有害内容）、PII 检测（识别并脱敏/拦截个人敏感信息）、Denied Topics（拒绝回答特定话题）、以及 Word Filters。模型权重加密是基础设施层面的安全措施，由 Bedrock 平台自动处理，不属于 Guardrails 的配置范围。'
  }
];

// === 7 Steps ===
var stages = [
  // Step 1: AI 安全全景 — 洋葱模型
  {
    title: 'AI 安全全景',
    desc: 'AI 系统的安全是多层防护体系，类似洋葱模型 — 从外层的运行时安全，到中层的模型安全，再到核心的数据安全。每一层都有独特的威胁和防护手段。<br><br><strong style="color:#ffa500">核心思想：</strong>纵深防御（Defense in Depth）— 没有单一银弹，而是层层叠加的安全机制。',
    viz: function() {
      return '<div class="onion-wrap" id="onionViz">' +
        '<div class="onion-layer show" style="width:260px;height:260px;border:3px solid rgba(255,165,0,.3);background:rgba(255,165,0,.04)"><span class="label" style="top:8px;color:#ffa500">🌐 运行时安全</span></div>' +
        '<div class="onion-layer show" style="width:190px;height:190px;border:3px solid rgba(80,160,255,.4);background:rgba(80,160,255,.06);animation-delay:.2s"><span class="label" style="top:6px;color:#50a0ff">🤖 模型安全</span></div>' +
        '<div class="onion-layer show" style="width:120px;height:120px;border:3px solid rgba(0,220,130,.4);background:rgba(0,220,130,.08);animation-delay:.4s"><span class="label" style="top:8px;color:#00dc82">🔒 数据安全</span></div>' +
        '</div>' +
        '<div class="card-row" style="margin-top:16px">' +
        '<div class="card-sm" style="border-color:rgba(255,165,0,.3)"><div class="icon">🌐</div><h4 style="color:#ffa500">运行时安全</h4>API 限速、DDoS 防护、WAF 规则、访问日志、异常检测</div>' +
        '<div class="card-sm" style="border-color:rgba(80,160,255,.3)"><div class="icon">🤖</div><h4 style="color:#50a0ff">模型安全</h4>对抗样本防护、模型投毒检测、Prompt 注入防御、输出过滤</div>' +
        '<div class="card-sm" style="border-color:rgba(0,220,130,.3)"><div class="icon">🔒</div><h4 style="color:#00dc82">数据安全</h4>训练数据加密、PII 脱敏、数据血缘追踪、访问控制</div>' +
        '</div>';
    }
  },

  // Step 2: IAM for ML
  {
    title: 'IAM for ML',
    desc: '机器学习工作负载的权限管理比传统应用更复杂 — 训练任务需要访问数据、模型需要调用其他服务、端点需要被应用调用。<strong style="color:#ffa500">最小权限原则</strong>是黄金法则：只授予完成任务所需的最小权限集。',
    viz: function() {
      return '<div style="text-align:center">' +
        '<div style="margin-bottom:16px;font-size:.8rem;color:#888">SageMaker / Bedrock 典型 IAM 架构</div>' +
        '<div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">' +
        '<div class="tok tok-orange" style="animation-delay:.1s">SageMaker Execution Role</div>' +
        '<div class="tok tok-blue" style="animation-delay:.2s">Bedrock InvokeModel</div>' +
        '<div class="tok tok-green" style="animation-delay:.3s">S3 Read (特定桶)</div>' +
        '<div class="tok tok-purple" style="animation-delay:.4s">KMS Decrypt</div>' +
        '</div>' +
        '<div style="margin:20px 0;padding:16px;background:rgba(0,0,0,.2);border-radius:10px;text-align:left;font-size:.78rem;color:#bbb;line-height:1.8">' +
        '<div style="color:#ffa500;font-weight:600;margin-bottom:8px">📋 最小权限清单示例：</div>' +
        '<div style="font-family:monospace;font-size:.72rem;color:#aaa">' +
        '┌─ <span style="color:#ffa500">Training Job</span> ─────────────────────────────┐<br>' +
        '│ s3:GetObject → s3://my-bucket/training-data/* │<br>' +
        '│ s3:PutObject → s3://my-bucket/model-output/*  │<br>' +
        '│ kms:Decrypt  → arn:aws:kms:...:key/xxx        │<br>' +
        '│ logs:CreateLogGroup, PutLogEvents              │<br>' +
        '└────────────────────────────────────────────────┘<br><br>' +
        '┌─ <span style="color:#50a0ff">Bedrock App</span> ──────────────────────────────┐<br>' +
        '│ bedrock:InvokeModel → specific-model-id       │<br>' +
        '│ bedrock:ApplyGuardrail → guardrail-id         │<br>' +
        '│ ❌ 不需要 bedrock:* 或 s3:*                    │<br>' +
        '└────────────────────────────────────────────────┘</div>' +
        '</div>' +
        '<div style="font-size:.76rem;color:#888;margin-top:10px">💡 <span style="color:#ffa500">SA 建议</span>：使用 IAM Access Analyzer 发现未使用的权限，定期收紧策略</div>' +
        '</div>';
    }
  },

  // Step 3: 网络隔离 — VPC 拓扑动画
  {
    title: '网络隔离',
    desc: 'AI 工作负载应部署在 VPC 内实现网络隔离。通过 PrivateLink 访问 AWS 服务（Bedrock、S3、ECR），训练数据和模型推理流量不经过公共互联网。<br><br><strong style="color:#ffa500">核心原则：</strong>数据平面零公网暴露 — 所有 AI 相关流量走私有通道。',
    viz: function() {
      return '<div class="vpc-topo">' +
        '<div class="vpc-box">' +
        '<div style="position:absolute;top:-12px;left:20px;background:#1a1a2e;padding:0 8px;font-size:.75rem;color:#ffa500;font-weight:600">🏢 VPC (10.0.0.0/16)</div>' +
        '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:10px">' +
        // Public subnet
        '<div class="subnet subnet-pub" style="animation:fadeUp .5s ease forwards;opacity:0;animation-delay:.1s">' +
        '<div style="font-size:.72rem;color:#00dc82;font-weight:600;margin-bottom:8px">公有子网 (AZ-a)</div>' +
        '<div class="svc-node">🌐 NAT GW</div>' +
        '<div class="svc-node">⚖️ ALB</div>' +
        '</div>' +
        // Private subnet 1
        '<div class="subnet subnet-priv" style="animation:fadeUp .5s ease forwards;opacity:0;animation-delay:.3s">' +
        '<div style="font-size:.72rem;color:#50a0ff;font-weight:600;margin-bottom:8px">私有子网 (AZ-a)</div>' +
        '<div class="svc-node">🤖 SageMaker Endpoint</div>' +
        '<div class="svc-node">📦 ECS Task</div>' +
        '</div>' +
        // Private subnet 2
        '<div class="subnet subnet-priv" style="animation:fadeUp .5s ease forwards;opacity:0;animation-delay:.5s">' +
        '<div style="font-size:.72rem;color:#50a0ff;font-weight:600;margin-bottom:8px">私有子网 (AZ-b)</div>' +
        '<div class="svc-node">🧠 Training Job</div>' +
        '<div class="svc-node">💾 EFS</div>' +
        '</div>' +
        '</div>' +
        // PrivateLink endpoints
        '<div style="margin-top:16px;padding:12px;border:1px dashed rgba(180,100,255,.4);border-radius:10px;background:rgba(180,100,255,.03)">' +
        '<div style="font-size:.72rem;color:#b464ff;font-weight:600;margin-bottom:8px">🔗 VPC Endpoints (PrivateLink)</div>' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
        '<span class="tok tok-purple" style="animation-delay:.6s;font-size:.7rem">com.amazonaws.bedrock-runtime</span>' +
        '<span class="tok tok-purple" style="animation-delay:.7s;font-size:.7rem">com.amazonaws.s3</span>' +
        '<span class="tok tok-purple" style="animation-delay:.8s;font-size:.7rem">com.amazonaws.ecr.api</span>' +
        '<span class="tok tok-purple" style="animation-delay:.9s;font-size:.7rem">com.amazonaws.sagemaker.runtime</span>' +
        '</div></div>' +
        '</div>' +
        '<div style="margin-top:12px;font-size:.76rem;color:#888;text-align:center">流量路径: App → <span style="color:#50a0ff">私有子网</span> → <span style="color:#b464ff">VPC Endpoint</span> → AWS Service（全程不经公网）</div>' +
        '</div>';
    }
  },

  // Step 4: 数据加密
  {
    title: '数据加密',
    desc: '加密是数据安全的最后一道防线。AI 系统中需要保护的数据包括：训练数据、模型权重、推理输入/输出、日志。AWS KMS 提供统一的密钥管理。<br><br><strong style="color:#ffa500">加密三要素：</strong>静态加密（At Rest）+ 传输加密（In Transit）+ 使用中加密（In Use）。',
    viz: function() {
      return '<div style="text-align:center">' +
        '<div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center">' +
        // At Rest
        '<div class="card-sm" style="border-color:rgba(0,220,130,.3);flex:1;min-width:180px">' +
        '<div class="icon">🗄️</div>' +
        '<h4 style="color:#00dc82">静态加密 (At Rest)</h4>' +
        '<div style="font-size:.75rem;margin-top:6px">' +
        '<div class="tok tok-green" style="font-size:.68rem;margin:2px">S3 SSE-KMS</div>' +
        '<div class="tok tok-green" style="font-size:.68rem;margin:2px">EBS 加密卷</div>' +
        '<div class="tok tok-green" style="font-size:.68rem;margin:2px">SageMaker 模型加密</div>' +
        '</div></div>' +
        // In Transit
        '<div class="card-sm" style="border-color:rgba(80,160,255,.3);flex:1;min-width:180px">' +
        '<div class="icon">🔄</div>' +
        '<h4 style="color:#50a0ff">传输加密 (In Transit)</h4>' +
        '<div style="font-size:.75rem;margin-top:6px">' +
        '<div class="tok tok-blue" style="font-size:.68rem;margin:2px">TLS 1.2+</div>' +
        '<div class="tok tok-blue" style="font-size:.68rem;margin:2px">VPC 内加密</div>' +
        '<div class="tok tok-blue" style="font-size:.68rem;margin:2px">Inter-node 训练加密</div>' +
        '</div></div>' +
        // In Use
        '<div class="card-sm" style="border-color:rgba(255,165,0,.3);flex:1;min-width:180px">' +
